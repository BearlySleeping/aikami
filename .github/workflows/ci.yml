name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  BUN_VERSION: "1.1.18"

jobs:
  lint-and-format:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Check formatting
        run: bun run format

      - name: Run linter
        run: bun run lint

      - name: Type check
        run: bun run check

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Run backend tests
        run: cd apps/backend && bun test

      - name: Test backend build
        run: cd apps/backend && bun run build

  test-packages:
    name: Test Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Test common-types package
        run: cd packages/common-types && bun test

      - name: Test ai-logic package
        run: cd packages/ai-logic && bun test

      - name: Check common-types package
        run: cd packages/common-types && bun run check

      - name: Check ai-logic package
        run: cd packages/ai-logic && bun run check

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Run SvelteKit sync
        working-directory: apps/frontend
        run: npm run sync

      - name: Build frontend
        working-directory: apps/frontend
        run: npm run build

      - name: Run frontend tests
        run: cd apps/frontend && bun test

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Install dependencies
        run: bun install

      - name: Build backend
        run: cd apps/backend && bun run build

      - name: Build frontend
        working-directory: apps/frontend
        run: npm run build

      - name: Start backend for integration tests
        run: |
          cd apps/backend && bun start &
          echo $! > backend.pid
        env:
          PORT: 8000

      - name: Wait for backend to start
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:8000/health; do sleep 1; done'

      - name: Run integration tests
        run: bun test tests/integration/

      - name: Stop backend
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) || true
          fi

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4



      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Run npm audit
        working-directory: apps/frontend
        run: npm audit --audit-level=moderate

      - name: Run Deno security scan
        run: bun run check

  build-matrix:
    name: Build Matrix
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install

      - name: Check workspace
        run: bun run check

      - name: Build backend
        run: cd apps/backend && bun run build