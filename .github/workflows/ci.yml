name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  DENO_VERSION: "1.45.0"
  NODE_VERSION: "20"

jobs:
  lint-and-format:
    name: Lint and Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ hashFiles('**/deno.json', '**/deno.lock') }}
          restore-keys: deno-

      - name: Check formatting
        run: deno fmt --check

      - name: Run linter
        run: deno lint

      - name: Type check
        run: deno check **/*.ts

  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ hashFiles('**/deno.json', '**/deno.lock') }}
          restore-keys: deno-

      - name: Run backend tests
        run: deno task --cwd apps/backend test

      - name: Test backend build
        run: deno task --cwd apps/backend build

  test-packages:
    name: Test Packages
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ hashFiles('**/deno.json', '**/deno.lock') }}
          restore-keys: deno-

      - name: Test common-types package
        run: deno task --cwd packages/common-types test

      - name: Test ai-logic package
        run: deno task --cwd packages/ai-logic test

      - name: Check common-types package
        run: deno task --cwd packages/common-types check

      - name: Check ai-logic package
        run: deno task --cwd packages/ai-logic check

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Run SvelteKit sync
        working-directory: apps/frontend
        run: npm run sync

      - name: Build frontend
        working-directory: apps/frontend
        run: npm run build

      - name: Run frontend tests (Deno)
        run: deno task --cwd apps/frontend test

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ hashFiles('**/deno.json', '**/deno.lock') }}
          restore-keys: deno-

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Build backend
        run: deno task --cwd apps/backend build

      - name: Build frontend
        working-directory: apps/frontend
        run: npm run build

      - name: Start backend for integration tests
        run: |
          deno task --cwd apps/backend start &
          echo $! > backend.pid
        env:
          PORT: 8000

      - name: Wait for backend to start
        run: |
          timeout 30 bash -c 'until curl -f http://localhost:8000/health; do sleep 1; done'

      - name: Run integration tests
        run: deno test --allow-all tests/integration/

      - name: Stop backend
        run: |
          if [ -f backend.pid ]; then
            kill $(cat backend.pid) || true
          fi

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Run npm audit
        working-directory: apps/frontend
        run: npm audit --audit-level=moderate

      - name: Run Deno security scan
        run: deno check --unstable **/*.ts

  build-matrix:
    name: Build Matrix
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        deno-version: ["1.45.0", "1.44.0"]
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: ${{ matrix.deno-version }}

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: ${{ matrix.os }}-deno-${{ matrix.deno-version }}-${{ hashFiles('**/deno.json', '**/deno.lock') }}
          restore-keys: |
            ${{ matrix.os }}-deno-${{ matrix.deno-version }}-
            ${{ matrix.os }}-deno-

      - name: Check workspace
        run: deno task check

      - name: Build backend
        run: deno task --cwd apps/backend build