name: Deploy

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  DENO_VERSION: "1.45.0"
  NODE_VERSION: "20"
  REGISTRY: gcr.io
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  BACKEND_IMAGE: gcr.io/${{ secrets.GCP_PROJECT_ID }}/backend
  FRONTEND_FIREBASE_PROJECT: ${{ secrets.FIREBASE_PROJECT_ID }}

jobs:
  determine-environment:
    name: Determine Environment
    runs-on: ubuntu-latest
    outputs:
      environment: ${{ steps.env.outputs.environment }}
      is-production: ${{ steps.env.outputs.is-production }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ github.event.inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "environment=production" >> $GITHUB_OUTPUT
          else
            echo "environment=staging" >> $GITHUB_OUTPUT
          fi

          if [[ "${{ steps.env.outputs.environment }}" == "production" ]]; then
            echo "is-production=true" >> $GITHUB_OUTPUT
          else
            echo "is-production=false" >> $GITHUB_OUTPUT
          fi

  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest
    needs: determine-environment
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Cache Deno dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/deno
          key: deno-${{ hashFiles('**/deno.json', '**/deno.lock') }}
          restore-keys: deno-

      - name: Run tests
        run: deno task --cwd apps/backend test

      - name: Build backend
        run: deno task --cwd apps/backend build

      - name: Setup Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker
        run: gcloud auth configure-docker

      - name: Create Dockerfile
        working-directory: apps/backend
        run: |
          cat > Dockerfile << 'EOF'
          FROM denoland/deno:1.45.0
          WORKDIR /app
          COPY . .
          RUN deno cache src/main.ts
          EXPOSE 8000
          CMD ["deno", "run", "--allow-net", "--allow-read", "--allow-env", "src/main.ts"]
          EOF

      - name: Build Docker image
        working-directory: apps/backend
        run: |
          docker build -t ${{ env.BACKEND_IMAGE }}:${{ github.sha }} .
          docker tag ${{ env.BACKEND_IMAGE }}:${{ github.sha }} ${{ env.BACKEND_IMAGE }}:${{ needs.determine-environment.outputs.environment }}

      - name: Push Docker image
        run: |
          docker push ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.BACKEND_IMAGE }}:${{ needs.determine-environment.outputs.environment }}

  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: determine-environment
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: apps/frontend/package-lock.json

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Install dependencies
        working-directory: apps/frontend
        run: npm ci

      - name: Create environment file
        working-directory: apps/frontend
        run: |
          if [[ "${{ needs.determine-environment.outputs.environment }}" == "production" ]]; then
            cat > .env.local << EOF
          PUBLIC_FIREBASE_API_KEY=${{ secrets.PUBLIC_FIREBASE_API_KEY_PROD }}
          PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.PUBLIC_FIREBASE_AUTH_DOMAIN_PROD }}
          PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.PUBLIC_FIREBASE_PROJECT_ID_PROD }}
          PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.PUBLIC_FIREBASE_STORAGE_BUCKET_PROD }}
          PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.PUBLIC_FIREBASE_MESSAGING_SENDER_ID_PROD }}
          PUBLIC_FIREBASE_APP_ID=${{ secrets.PUBLIC_FIREBASE_APP_ID_PROD }}
          PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.PUBLIC_FIREBASE_MEASUREMENT_ID_PROD }}
          PUBLIC_API_BASE_URL=${{ secrets.PUBLIC_API_BASE_URL_PROD }}
          PUBLIC_APP_ENV=production
          PUBLIC_ENABLE_ANALYTICS=true
          EOF
          else
            cat > .env.local << EOF
          PUBLIC_FIREBASE_API_KEY=${{ secrets.PUBLIC_FIREBASE_API_KEY_STAGING }}
          PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.PUBLIC_FIREBASE_AUTH_DOMAIN_STAGING }}
          PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.PUBLIC_FIREBASE_PROJECT_ID_STAGING }}
          PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.PUBLIC_FIREBASE_STORAGE_BUCKET_STAGING }}
          PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.PUBLIC_FIREBASE_MESSAGING_SENDER_ID_STAGING }}
          PUBLIC_FIREBASE_APP_ID=${{ secrets.PUBLIC_FIREBASE_APP_ID_STAGING }}
          PUBLIC_FIREBASE_MEASUREMENT_ID=${{ secrets.PUBLIC_FIREBASE_MEASUREMENT_ID_STAGING }}
          PUBLIC_API_BASE_URL=${{ secrets.PUBLIC_API_BASE_URL_STAGING }}
          PUBLIC_APP_ENV=staging
          PUBLIC_ENABLE_ANALYTICS=false
          EOF
          fi

      - name: Run SvelteKit sync
        working-directory: apps/frontend
        run: npm run sync

      - name: Build frontend
        working-directory: apps/frontend
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: apps/frontend/build/
          retention-days: 7

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: [determine-environment, build-backend]
    environment: ${{ needs.determine-environment.outputs.environment }}
    steps:
      - name: Setup Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Deploy to Cloud Run
        run: |
          if [[ "${{ needs.determine-environment.outputs.environment }}" == "production" ]]; then
            SERVICE_NAME="backend-prod"
            MIN_INSTANCES="1"
            MAX_INSTANCES="100"
            CPU="2"
            MEMORY="2Gi"
          else
            SERVICE_NAME="backend-staging"
            MIN_INSTANCES="0"
            MAX_INSTANCES="10"
            CPU="1"
            MEMORY="1Gi"
          fi

          gcloud run deploy $SERVICE_NAME \
            --image ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --platform managed \
            --region us-central1 \
            --allow-unauthenticated \
            --port 8000 \
            --cpu $CPU \
            --memory $MEMORY \
            --min-instances $MIN_INSTANCES \
            --max-instances $MAX_INSTANCES \
            --set-env-vars="NODE_ENV=${{ needs.determine-environment.outputs.environment }}" \
            --set-env-vars="PORT=8000" \
            --timeout=300 \
            --concurrency=1000

      - name: Get service URL
        id: service-url
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME --platform managed --region us-central1 --format 'value(status.url)')
          echo "url=$URL" >> $GITHUB_OUTPUT

      - name: Health check
        run: |
          timeout 60 bash -c 'until curl -f ${{ steps.service-url.outputs.url }}/health; do sleep 5; done'

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: [determine-environment, build-frontend, deploy-backend]
    environment: ${{ needs.determine-environment.outputs.environment }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: apps/frontend/build/

      - name: Setup Firebase CLI
        uses: w9jds/firebase-action@master
        with:
          args: --version

      - name: Create Firebase config
        working-directory: apps/frontend
        run: |
          if [[ "${{ needs.determine-environment.outputs.environment }}" == "production" ]]; then
            PROJECT_ID="${{ secrets.FIREBASE_PROJECT_ID_PROD }}"
            HOSTING_TARGET="production"
          else
            PROJECT_ID="${{ secrets.FIREBASE_PROJECT_ID_STAGING }}"
            HOSTING_TARGET="staging"
          fi

          cat > firebase.json << EOF
          {
            "hosting": {
              "target": "$HOSTING_TARGET",
              "public": "build",
              "ignore": ["firebase.json", "**/.*", "**/node_modules/**"],
              "rewrites": [
                {
                  "source": "**",
                  "destination": "/index.html"
                }
              ],
              "headers": [
                {
                  "source": "**/*.@(js|css)",
                  "headers": [
                    {
                      "key": "Cache-Control",
                      "value": "max-age=31536000,immutable"
                    }
                  ]
                }
              ]
            }
          }
          EOF

      - name: Deploy to Firebase Hosting
        uses: w9jds/firebase-action@master
        with:
          args: deploy --only hosting --project ${{ needs.determine-environment.outputs.environment == 'production' && secrets.FIREBASE_PROJECT_ID_PROD || secrets.FIREBASE_PROJECT_ID_STAGING }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
          PROJECT_PATH: apps/frontend

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: [determine-environment, deploy-backend, deploy-frontend]
    if: needs.determine-environment.outputs.environment == 'staging'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: ${{ env.DENO_VERSION }}

      - name: Run integration tests
        run: |
          # Add your integration test commands here
          echo "Running integration tests against staging environment..."
          # deno test --allow-all tests/integration/ --env=staging

  rollback:
    name: Rollback (Manual)
    runs-on: ubuntu-latest
    needs: [determine-environment]
    if: failure() && needs.determine-environment.outputs.is-production == 'true'
    environment: production-rollback
    steps:
      - name: Setup Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v1
        with:
          service_account_key: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ env.PROJECT_ID }}

      - name: Rollback backend
        run: |
          PREVIOUS_REVISION=$(gcloud run revisions list --service=backend-prod --platform=managed --region=us-central1 --format='value(metadata.name)' --limit=2 | tail -n 1)
          gcloud run services update-traffic backend-prod --to-revisions=$PREVIOUS_REVISION=100 --platform=managed --region=us-central1

      - name: Notify rollback
        run: |
          echo "🚨 Production rollback completed for backend service"
          echo "Previous revision: $PREVIOUS_REVISION"

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [determine-environment, deploy-backend, deploy-frontend]
    if: always()
    steps:
      - name: Notify success
        if: needs.deploy-backend.result == 'success' && needs.deploy-frontend.result == 'success'
        run: |
          echo "✅ Deployment to ${{ needs.determine-environment.outputs.environment }} completed successfully!"

      - name: Notify failure
        if: needs.deploy-backend.result == 'failure' || needs.deploy-frontend.result == 'failure'
        run: |
          echo "❌ Deployment to ${{ needs.determine-environment.outputs.environment }} failed!"
