$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'application'
tags:
  - 'game'
  - 'frontend'
  - 'application'

dependsOn:
  - 'frontend-api-core'

toolchains:
  javascript: false

project:
  name: 'game'
  description: 'Standalone PixiJS + bitECS game with vanilla TypeScript frontend.'
  channel: '#frontend'
  owner: 'Frontend Team'

fileGroups:
  sources:
    - 'src/**/*'
    - 'index.html'
  configs:
    - 'package.json'
    - 'tsconfig.json'
    - 'tsconfig.test.json'
    - 'vite.config.*'
  unitTests:
    - 'src/**/*.test.ts'

tasks:
  dev:
    command: 'bun run dev'
    preset: 'server'
  build:
    command: 'bun run build'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    outputs:
      - 'dist'
  preview:
    command: 'bun run preview'
    preset: 'server'
  test:
    command: 'bun run test:unit'
    inputs:
      - '@group(unitTests)'
      - '@group(sources)'
  test-unit:
    command: 'bun run test:unit'
    inputs:
      - '@group(unitTests)'
      - '@group(sources)'

