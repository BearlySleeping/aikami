# apps/frontend/docs/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'application'
tags:
  - 'documentation'
  - 'astro'
  - 'application'

project:
  name: 'docs'
  description: 'Project documentation website built with Astro.'
  channel: '#frontend'
  owner: 'Frontend Team'

dependsOn:
  - 'constants'
  - 'schemas'
  - 'types'

fileGroups:
  sources:
    - 'src/**/*'
    - 'public/**/*'
  configs:
    - 'package.json'
    - 'tsconfig.json'
    - 'tailwind.config.*'
    - 'astro.config.*'
  tests:
    - 'tests/**/*'

tasks:
  dev:
    command: 'bun run dev'
    preset: 'server'
  start:
    command: 'bun run start'
    preset: 'server'
  build:
    command: 'bun run build'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    outputs:
      - 'dist'
  preview:
    command: 'bun run preview'
    preset: 'server'
  astro:
    command: 'bun run astro'
