# apps/frontend/landing_page/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'application'
stack: 'frontend'
tags:
  - 'website'
  - 'astro'
  - 'application'

project:
  title: 'Landing Page'
  description: 'Public marketing landing page built with Astro.'
  channel: '#frontend'
  owner: 'Frontend Team'

dependsOn:
  - 'constants'
  - 'schemas'
  - 'types'

fileGroups:
  sources:
    - 'src/**/*'
    - 'public/**/*'
  configs:
    - 'package.json'
    - 'tsconfig.json'
    - 'tailwind.config.*'
    - 'astro.config.*'
  tests:
    - 'tests/**/*'

tasks:
  dev:
    command: 'bun run dev'
    preset: 'server'
  start:
    command: 'bun run start'
    preset: 'server'
  build:
    command: 'bun run build'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    outputs:
      - 'dist'
  preview:
    command: 'bun run preview'
    preset: 'server'
  astro:
    command: 'bun run astro'
  typecheck:
    command: 'bun run typecheck'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  format:
    command: 'bun run format'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  lint:
    command: 'bun run lint'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  fix:
    command: 'bun run fix'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
