# apps/frontend/game2/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'application'
stack: 'frontend'
tags:
  - 'game2'
  - 'godotjs'
  - 'game'

toolchains:
  javascript: false

project:
  title: 'Game2'
  description: 'GodotJS game project using TypeScript.'
  channel: '#game-dev'
  owner: 'Game Team'

fileGroups:
  sources:
    - 'src/**/*'
    - 'tests/**/*'
  configs:
    - 'package.json'
    - 'tsconfig.json'
    - 'project.godot'
    - 'biome.json'
  tests:
    - 'tests/**/*'

tasks:
  dev:
    command: 'bun run dev'
    preset: 'server'
  build:
    command: 'bun run build'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  generate:
    command: 'bun run generate'
    inputs:
      - '@group(sources)'
  lint:
    command: 'bun run lint'
    inputs:
      - '@group(sources)'
  lintWrite:
    command: 'bun run lint:write'
    inputs:
      - '@group(sources)'
  format:
    command: 'bun run format'
    inputs:
      - '@group(sources)'
  formatWrite:
    command: 'bun run format:write'
    inputs:
      - '@group(sources)'
  check:
    command: 'bun run check'
    inputs:
      - '@group(sources)'
  fix:
    command: 'bun run fix'
    inputs:
      - '@group(sources)'
  typecheck:
    command: 'bun run typecheck'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  validate:
    command: 'bun run validate'
    inputs:
      - '@group(sources)'
      - '@group(tests)'
      - '@group(configs)'
  test:
    command: 'bun run test'
    inputs:
      - '@group(tests)'
      - '@group(sources)'
  open-editor:
    command: 'bun run open-editor'
  watch:
    command: 'bun run watch'
    preset: 'utility'
