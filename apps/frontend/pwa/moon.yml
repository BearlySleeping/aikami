# apps/frontend/pwa/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'application'
stack: 'frontend'
tags:
  - 'pwa'
  - 'svelte'
  - 'playwright'
  - 'application'

toolchains:
  javascript: false

project:
  title: 'PWA'
  description: 'Main Progressive Web Application built with SvelteKit.'
  channel: '#frontend'
  owner: 'Frontend Team'

dependsOn:
  - 'frontend-utils'
  - 'frontend-services'
  - 'schemas'
  - 'types'
  - 'constants'
  - 'logger'

fileGroups:
  sources:
    - 'src/**/*'
    - 'static/**/*'
    - 'messages/**/*'
  configs:
    - 'package.json'
    - 'tsconfig.json'
    - 'tailwind.config.*'
    - 'svelte.config.*'
    - 'vite.config.*'
  tests:
    - 'tests/**/*'
    - 'playwright.config.*'
  unitTests:
    - 'src/**/*.test.ts'

tasks:
  dev:
    command: 'bun run dev'
    preset: 'server'
  build:
    command: 'bun run build'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    outputs:
      - '.svelte-kit'
      - 'build'
  preview:
    command: 'bun run preview'
    preset: 'server'
  test:
    script: |
      bun run test:unit
      bun run build && bun run preview & PID=$!; sleep 5; bun run test; RESULT=$?; kill $PID 2>/dev/null || true; exit $RESULT
    deps:
      - 'build'
    inputs:
      - '@group(tests)'
      - '@group(unitTests)'
      - '@group(sources)'
  test-unit:
    command: 'bun run test:unit'
    inputs:
      - '@group(unitTests)'
      - '@group(sources)'
  test-e2e:
    script: 'bun run build && bun run preview & PID=$!; sleep 5; bun run test; RESULT=$?; kill $PID 2>/dev/null || true; exit $RESULT'
    deps:
      - 'build'
    inputs:
      - '@group(tests)'
      - '@group(sources)'
  test-ci:
    script: 'bun run build && bun run preview -- --host & PID=$!; sleep 8; bun run test -- --reporter=github; RESULT=$?; kill $PID 2>/dev/null || true; exit $RESULT'
    deps:
      - 'build'
    inputs:
      - '@group(tests)'
      - '@group(sources)'
  typecheck:
    command: 'bun run typecheck'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  lint:
    command: 'bun run lint'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  format:
    command: 'bun run format'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  check:
    command: 'bun run check'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  fix:
    command: 'bun run fix'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  validate:
    command: 'bun run validate'
    inputs:
      - '@group(sources)'
      - '@group(tests)'
      - '@group(configs)'
