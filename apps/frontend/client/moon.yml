# apps/frontend/client/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'application'
tags:
  - 'client'
  - 'svelte'
  - 'application'

project:
  name: 'client'
  description: 'Main Progressive Web Application built with SvelteKit.'
  channel: '#frontend'
  owner: 'Frontend Team'

dependsOn:
  - 'parser'
  - 'frontend-utils'
  - 'frontend-services'
  - 'frontend-api-core'
  - 'schemas'
  - 'types'
  - 'constants'
  - 'logger'
  - 'utils'

fileGroups:
  sources:
    - 'src/**/*'
    - 'static/**/*'
    - 'messages/**/*'
  configs:
    - 'package.json'
    - 'tsconfig.json'
    - 'tailwind.config.*'
    - 'svelte.config.*'
    - 'vite.config.*'
  srcTauri:
    - 'src-tauri/**/*'
  unitTests:
    - 'src/**/*.test.ts'

tasks:
  dev:
    command: 'bun run dev'
    preset: 'server'
  build:
    command: 'bun run build'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    outputs:
      - '.svelte-kit'
      - 'build'
  preview:
    command: 'bun run preview'
    preset: 'server'
  test:
    command: 'bun run test:unit'
    inputs:
      - '@group(unitTests)'
      - '@group(sources)'
  test-unit:
    command: 'bun run test:unit'
    inputs:
      - '@group(unitTests)'
      - '@group(sources)'
  tauri-dev:
    command: 'bun run tauri:dev'
    preset: 'server'
  tauri-build:
    command: 'bun run tauri:build'
    options:
      cache: false
    inputs:
      - '@group(sources)'
      - '@group(srcTauri)'
      - '@group(configs)'
