<!-- biome-ignore-all lint/a11y/useValidLang: Paraglide i18n uses dynamic lang="%paraglide.lang%" placeholder resolved at build time -->
<!DOCTYPE html>
<html lang="%paraglide.lang%">
  <head>
    <meta charset="utf-8">
    <link rel="icon" href="%sveltekit.assets%/favicon.png">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
    <script>
    // Register the audio-range service worker for iOS Safari compatibility.
    // Contract: C-150 Audio System — Service Worker Range Interceptor
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js', { scope: '/' });
    }
    </script>
  </body>
</html>
