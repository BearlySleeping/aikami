# apps/backend/rules/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'application'
stack: 'backend'
tags:
  - 'firebase'
  - 'security'
  - 'application'

project:
  title: 'Firebase Rules'
  description: 'Security rules for Firebase Firestore and Cloud Storage.'
  channel: '#backend'
  owner: 'Backend Team'

dependsOn:
  - 'backend-configs'
  - 'backend-utils'
  - 'schemas'
  - 'types'
  - 'constants'
  - 'logger'

fileGroups:
  sources:
    - 'src/**/*'
    - '*.rules'
  configs:
    - 'package.json'
    - 'firebase.json'
    - 'firestore.*.json'
  tests:
    - 'tests/**/*'

tasks:
  format:
    command: 'bun run format'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  lint:
    command: 'bun run lint'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  typecheck:
    command: 'bun run typecheck'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  check:
    command: 'bun run check'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  fix:
    command: 'bun run fix'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  validate:
    command: 'bun run validate'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
