# apps/backend/functions/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'application'
stack: 'backend'
tags:
  - 'firebase'
  - 'functions'

project:
  name: 'Firebase Functions'
  description: 'Backend cloud functions for the application.'
  channel: '#backend'
  owner: 'Backend Team'

dependsOn:
  - 'backend-configs'
  - 'backend-utils'
  - 'schemas'
  - 'types'
  - 'constants'
  - 'logger'

fileGroups:
  sources:
    - 'src/**/*'
    - 'scripts/**/*'
  configs:
    - 'deno.json'
    - 'tsconfig.json'
    - 'compile.ts'
    - 'deploy.ts'

tasks:
  build:
    command: 'deno task build'
    inputs:
      - '/deno.json'
      - '/deno.lock'
      - '@group(sources)'
      - '@group(configs)'
    outputs:
      - 'build'
  check:
    command: 'deno task check'
    inputs:
      - '/deno.json'
      - '/deno.lock'
      - '@group(sources)'
      - '@group(configs)'
  format:
    command: 'deno task format'
    inputs:
      - '/deno.json'
      - '/deno.lock'
      - '@group(sources)'
      - '@group(configs)'
  lint:
    command: 'deno task lint'
    inputs:
      - '/deno.json'
      - '/deno.lock'
      - '@group(sources)'
      - '@group(configs)'
  test:
    command: 'deno task test'
    inputs:
      - '/deno.json'
      - '/deno.lock'
      - '@group(sources)'
      - '@group(configs)'
