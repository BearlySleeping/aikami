# apps/backend/functions/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'application'
stack: 'backend'
tags:
  - 'firebase'
  - 'functions'
  - 'application'

project:
  title: 'Firebase Functions'
  description: 'Backend cloud functions deployed to Firebase Cloud Functions.'
  channel: '#backend'
  owner: 'Backend Team'

dependsOn:
  - 'backend-configs'
  - 'backend-utils'
  - 'schemas'
  - 'types'
  - 'constants'
  - 'logger'

fileGroups:
  sources:
    - 'src/**/*'
    - 'scripts/**/*'
  configs:
    - 'package.json'
    - 'tsconfig.json'
    - '*.ts'
  tests:
    - 'tests/**/*'

tasks:
  build:
    command: 'bun run build'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    outputs:
      - 'build'
  deploy:
    command: 'bun run deploy'
    deps:
      - 'build'
  typecheck:
    command: 'bun run typecheck'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  format:
    command: 'bun run format'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  lint:
    command: 'bun run lint'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  test:
    command: 'bun run test'
    inputs:
      - '@group(sources)'
      - '@group(tests)'
      - '@group(configs)'
  fix:
    command: 'bun run fix'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  validate:
    command: 'bun run validate'
    inputs:
      - '@group(sources)'
      - '@group(tests)'
      - '@group(configs)'
