# apps/backend/voice/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'application'
tags:
  - 'voice'
  - 'backend'
  - 'application'
  - 'container'

project:
  name: 'voice'
  description: 'Headless Kokoro TTS container — Docker-only, no Bun source.'
  channel: '#backend'
  owner: 'Backend Team'

dependsOn: []

fileGroups:
  configs:
    - 'package.json'

tasks:
  build:
    command: 'true'

  dev:
    command: 'bun run dev:docker'
    preset: 'server'

  test:
    command: 'bun run test'
