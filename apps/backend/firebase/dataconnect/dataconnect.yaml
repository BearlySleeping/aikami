# apps/backend/firebase/dataconnect/dataconnect.yaml
# Firebase Data Connect service configuration for the Aikami backend.

specVersion: "v1"

# Unique service id within the Firebase project.
serviceId: aikami-db

# Path to the directory containing the source schema (GraphQL SDL).
location: .

schema:
  source: "./schema"
  datasource:
    postgresql:
      database: aikami
      cloudSql:
        instanceId: aikami-dev

connectorDirs:
  - "./connector"
