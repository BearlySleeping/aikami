# ---------------------------------------------------------------------------
# Users
# ---------------------------------------------------------------------------

query ListUsers @auth(level: PUBLIC) {
  users {
    id
    email
  }
}

# ---------------------------------------------------------------------------
# Audio Tracks — C-151 AI Dynamic Music
# ---------------------------------------------------------------------------

# Fetch audio tracks filtered by mood for the AI Director's music control.
query GetTracksByMood($mood: String!) @auth(level: PUBLIC) {
  audioTracks(where: { mood: { eq: $mood } }, limit: 10) {
    id
    title
    storageUrl
  }
}

# ---------------------------------------------------------------------------
# Save Slots
# ---------------------------------------------------------------------------

# List all save slots for the authenticated user, ordered by slot number.
query ListSaveSlots($uid: String!) @auth(level: PUBLIC) {
  saveSlots(where: { uid: { eq: $uid } }, orderBy: { slotNumber: ASC }) {
    id
    slotNumber
    lastLocationName
    playedTimeSeconds
    storageRef
    createdAt
    updatedAt
  }
}

# Upsert a save slot — creates or updates the row identified by id.
# The caller MUST construct id as "{uid}_{slotNumber}".
mutation UpsertSaveSlot(
  $id: String!
  $uid: String!
  $slotNumber: Int!
  $lastLocationName: String
  $playedTimeSeconds: Int
  $storageRef: String!
) @auth(level: PUBLIC) {
  saveSlot_upsert(
    data: {
      id: $id
      uid: $uid
      slotNumber: $slotNumber
      lastLocationName: $lastLocationName
      playedTimeSeconds: $playedTimeSeconds
      storageRef: $storageRef
    }
  )
}
