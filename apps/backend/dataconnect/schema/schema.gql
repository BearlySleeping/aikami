# apps/backend/dataconnect/schema/schema.gql
# ---------------------------------------------------------------------------
# Aikami — Data Connect PostgreSQL Schema
# ---------------------------------------------------------------------------
# Mirrors the core Firestore collection shapes as relational tables.
# Arrays and nested objects are stored as JSONB columns.
# Timestamps use the built-in GraphQL `Date` scalar.
#
# After modifying this file, regenerate the SDK with:
#   firebase dataconnect:generate
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Core types — shared across all tables
# ---------------------------------------------------------------------------

"""
ISO-8601 timestamp stored as a PostgreSQL timestamptz column.
Maps to Firestore's Timestamp type.
"""
scalar Date

"""
Arbitrary JSON payload stored as a PostgreSQL JSONB column.
Used for nested objects (stats, metadata, abilities) and arrays
that don't warrant separate join tables.
"""
scalar JSON

# ---------------------------------------------------------------------------
# Users
# ---------------------------------------------------------------------------

type User @table {
  """
  Firestore document id (maps to Firebase Auth uid for top-level users).
  """
  id: String! @col(name: "id")

  createdAt: Date @col(name: "created_at")
  updatedAt: Date @col(name: "updated_at")

  # Auth / profile fields
  displayName: String @col(name: "display_name")
  email:        String @col(name: "email")
  photoURL:     String @col(name: "photo_url")
  phoneNumber:  String @col(name: "phone_number")
  role:         String @col(name: "role")

  # Optional profile details
  firstName:    String @col(name: "first_name")
  lastName:     String @col(name: "last_name")
  countryCode:  String @col(name: "country_code")
  localeCode:   String @col(name: "locale_code")

  # Connected Google accounts (stored as JSONB array of email strings).
  connectedEmails: JSON @col(name: "connected_emails")

  # Sign-in providers (JSONB array of provider strings).
  signInProviders: JSON @col(name: "sign_in_providers")

  # Terms acceptance timestamp.
  agreedAt: Date @col(name: "agreed_at")

  # Aggregate counter.
  monthlyUploadedDuration: Int @col(name: "monthly_uploaded_duration")
}

# ---------------------------------------------------------------------------
# NPCs
# ---------------------------------------------------------------------------

type Npc @table {
  id:         String! @col(name: "id")
  createdAt:  Date    @col(name: "created_at")
  updatedAt:  Date    @col(name: "updated_at")

  name:        String @col(name: "name")
  description: String @col(name: "description")
  avatarUrl:   String @col(name: "avatar_url")
  personality: String @col(name: "personality")
  systemPrompt: String @col(name: "system_prompt")

  # Owner uid (Firebase Auth).
  uid: String @col(name: "uid")

  # Visibility (private / public).
  visibility: String @col(name: "visibility")

  # Character sheet (D&D stats, abilities, etc.) — JSONB.
  stats: JSON @col(name: "stats")

  # Tags (JSONB array).
  tags: JSON @col(name: "tags")
}

# ---------------------------------------------------------------------------
# Personas
# ---------------------------------------------------------------------------

type Persona @table {
  id:         String! @col(name: "id")
  createdAt:  Date    @col(name: "created_at")
  updatedAt:  Date    @col(name: "updated_at")

  name:        String @col(name: "name")
  description: String @col(name: "description")
  avatarUrl:   String @col(name: "avatar_url")

  # Owner uid.
  uid: String @col(name: "uid")

  # Persona-specific traits (JSONB).
  traits: JSON @col(name: "traits")
}

# ---------------------------------------------------------------------------
# Chats
# ---------------------------------------------------------------------------

type Chat @table {
  id:         String! @col(name: "id")
  createdAt:  Date    @col(name: "created_at")
  updatedAt:  Date    @col(name: "updated_at")

  # Owner uid (Firebase Auth).
  uid: String @col(name: "uid")

  # Associated NPC (denormalised for display).
  npcId:        String @col(name: "npc_id")
  npcName:      String @col(name: "npc_name")
  npcAvatarUrl: String @col(name: "npc_avatar_url")

  # Visibility (private / public).
  visibility: String @col(name: "visibility")

  # Aggregate counters.
  messageCount: Int @col(name: "message_count")
  affection:    Int @col(name: "affection")

  # Timestamp of the last message.
  lastMessageAt: Date @col(name: "last_message_at")

  # Background image URL.
  backgroundImageUrl: String @col(name: "background_image_url")

  # Character sheet stats (D&D) — JSONB.
  stats: JSON @col(name: "stats")

  # Messages are a separate table (see below) linked via chatId.
}

# ---------------------------------------------------------------------------
# Messages
# ---------------------------------------------------------------------------

type Message @table {
  id:         String! @col(name: "id")
  createdAt:  Date    @col(name: "created_at")
  updatedAt:  Date    @col(name: "updated_at")

  # Owning chat (foreign key into Chat.id).
  chatId: String! @col(name: "chat_id")

  # Message content.
  text:   String @col(name: "text")
  sender: String @col(name: "sender")   # "user" | "ai"

  # Edit tracking.
  editedAt: Date   @col(name: "edited_at")
  editedBy: String @col(name: "edited_by")  # "user" | "ai"

  # If this message was regenerated, points to the original message id.
  regeneratedFrom: String @col(name: "regenerated_from")

  # Denormalised chat owner / visibility for security rules.
  chatOwnerUid:    String @col(name: "chat_owner_uid")
  chatVisibility:  String @col(name: "chat_visibility")

  # Attachments (JSONB array of { type, url, name, mimeType, size }).
  attachments: JSON @col(name: "attachments")

  # Arbitrary metadata (JSONB).
  metadata: JSON @col(name: "metadata")
}

# ---------------------------------------------------------------------------
# Notifications
# ---------------------------------------------------------------------------

type Notification @table {
  id:         String! @col(name: "id")
  createdAt:  Date    @col(name: "created_at")
  updatedAt:  Date    @col(name: "updated_at")

  # Recipient uid.
  uid: String @col(name: "uid")

  # Notification type (e.g. "chat_message", "system").
  type: String @col(name: "type")

  title: String @col(name: "title")
  body:  String @col(name: "body")

  # Whether the notification has been read.
  isRead: Boolean @col(name: "is_read")

  # Optional link / deep-link target.
  link: String @col(name: "link")

  # Arbitrary payload (JSONB).
  data: JSON @col(name: "data")
}

# ---------------------------------------------------------------------------
# Configs (key-value app configuration)
# ---------------------------------------------------------------------------

type Config @table {
  id:         String! @col(name: "id")
  createdAt:  Date    @col(name: "created_at")
  updatedAt:  Date    @col(name: "updated_at")

  # Configuration key (unique).
  key: String @col(name: "key")

  # Configuration value (JSONB — can hold strings, numbers, objects, arrays).
  value: JSON @col(name: "value")
}
