# scripts/docker/comfyui/docker-compose.yml
# ComfyUI GPU container for Aikami image sandbox and generation.
# Uses the same image and volumes as the ai-stack setup, with CORS enabled.
#
# Start:  docker compose -f scripts/docker/comfyui/docker-compose.yml up -d
# Stop:   docker compose -f scripts/docker/comfyui/docker-compose.yml down
# Logs:   docker compose -f scripts/docker/comfyui/docker-compose.yml logs -f

services:
  comfyui:
    image: yanwk/comfyui-boot:cu130-slim-v2
    container_name: aikami-image-dev
    restart: unless-stopped
    ports:
      - '8188:8188'
    environment:
      - CLI_ARGS=--fast --enable-cors-header
    volumes:
      - /home/sonny/Development/Projects/passion/ai-stack/comfyui/models:/root/ComfyUI/models
      - /home/sonny/Development/Projects/passion/ai-stack/comfyui/output:/root/ComfyUI/output
      - /home/sonny/Development/Projects/passion/ai-stack/comfyui/user:/root/ComfyUI/user
      - /home/sonny/Development/Projects/passion/ai-stack/comfyui/custom_nodes:/root/ComfyUI/custom_nodes
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
