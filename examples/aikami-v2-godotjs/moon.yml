$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'application'
tags:
  - 'gamejs'
  - 'frontend'
  - 'application'

project:
  name: 'godotjs'
  description: 'GodotJS game using TypeScript for game logic.'
  channel: '#frontend'
  owner: 'Frontend Team'

fileGroups:
  sources:
    - 'src/**/*'
  configs:
    - 'package.json'
    - 'tsconfig.json'
    - 'project.godot'
  tests:
    - 'tests/**/*'

tasks:
  test:
    command: 'bun run test'
    inputs:
      - '@group(sources)'
      - '@group(tests)'
      - '@group(configs)'

  dev:
    command: 'bun run dev'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    options:
      runFromWorkspaceRoot: false

  build:
    command: 'bun run build'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    options:
      runFromWorkspaceRoot: false
