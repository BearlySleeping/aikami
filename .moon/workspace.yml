# .moon/workspace.yml
$schema: "https://moonrepo.dev/schemas/workspace.json"

projects:
  pi: ".pi"

  # Scripts
  scripts: "scripts"

  # App IDs
  client: "apps/frontend/client"
  site: "apps/frontend/site"
  docs: "apps/frontend/docs"
  e2e: "apps/e2e"
  firebase: "apps/backend/firebase"
  voice: "apps/backend/voice"
  image: "apps/backend/image"
  text: "apps/backend/text"

  # Shared Packages
  constants: "packages/shared/constants"
  schemas: "packages/shared/schemas"
  parser: "packages/shared/parser"
  types: "packages/shared/types"
  logger: "packages/shared/logger"
  utils: "packages/shared/utils"
  mocks: "packages/shared/mocks"

  # Backend Packages
  backend-ai: "packages/backend/ai"
  backend-chat: "packages/backend/chat"
  backend-configs: "packages/backend/configs"
  backend-utils: "packages/backend/utils"
  backend-database: "packages/backend/database"
  backend-auth: "packages/backend/auth"
  backend-image: "packages/backend/image"
  backend-svelte-kit: "packages/backend/svelte-kit"

  # Frontend Packages
  frontend-engine: "packages/frontend/engine"
  frontend-dataconnect: "packages/frontend/dataconnect"
  frontend-services: "packages/frontend/services"
  frontend-utils: "packages/frontend/utils"
  frontend-repositories: "packages/frontend/repositories"
  frontend-configs: "packages/frontend/configs"

vcs:
  provider: "github"
  defaultBranch: "master"
  remoteCandidates: ["origin"]
  hooks:
    pre-commit:
      - "bunx moon run :fix --affected --status=staged"
      - "bunx moon run :typecheck --affected --status=staged"
      - "bun knowledge:sync"
      # Explicitly add the files updated by knowledge:sync to the commit payload
      - "git add .context/llms.txt docs/contracts/ || true"
      # Re-add any other staged files that formatters might have modified
      - "git diff -z --name-only --cached | xargs -0 git add || true"
    post-merge:
      - "bunx moon sync"
    post-checkout:
      - "bunx moon sync"

constraints:
  enforceLayerRelationships: false

pipeline:
  cacheLifetime: "7 days"
  autoCleanCache: true
  inheritColorsForPipedTasks: true
  installDependencies: ["bun"]
  syncProjects: true
  syncWorkspace: true

hasher:
  walkStrategy: "vcs"
  optimization: "accuracy"
  warnOnMissingInputs: true
  ignoreMissingPatterns:
    - "**/.env"
    - "**/vite.config.ts"
    - "**/tsconfig*.json"

telemetry: false
