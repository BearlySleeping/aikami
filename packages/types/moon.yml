# packages/types/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'library'
tags:
  - 'types'
  - 'shared'
  - 'library'

project:
  title: 'Types'
  description: 'Shared TypeScript types and interfaces for the monorepo.'
  channel: '#general'
  owner: 'Core Team'

dependsOn:
  - 'constants'
  - 'schemas'

fileGroups:
  sources:
    - 'src/**/*'
    - '*.d.ts'
  configs:
    - 'package.json'
    - 'tsconfig.json'
  tests:
    - 'tests/**/*'

tasks:
  typecheck:
    command: 'bun run typecheck'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  format:
    command: 'bun run format'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  lint:
    command: 'bun run lint'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  fix:
    command: 'bun run fix'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  validate:
    command: 'bun run validate'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
