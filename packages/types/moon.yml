# packages/types/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'library'
stack: 'systems'
tags:
  - 'types'

project:
  name: 'Types'
  description: 'Shared TypeScript types and interfaces.'
  channel: '#general'
  owner: 'Core Team'

dependsOn:
  - 'schemas'

fileGroups:
  sources:
    - 'src/**/*'
  configs:
    - 'deno.json'

tasks:
  check:
    command: 'deno task check'
    inputs:
      - '/deno.json'
      - '/deno.lock'
      - '@group(sources)'
      - '@group(configs)'
  format:
    command: 'deno task format'
    inputs:
      - '/deno.json'
      - '/deno.lock'
      - '@group(sources)'
      - '@group(configs)'
  lint:
    command: 'deno task lint'
    inputs:
      - '/deno.json'
      - '/deno.lock'
      - '@group(sources)'
      - '@group(configs)'
