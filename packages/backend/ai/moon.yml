# packages/backend/ai/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'library'
stack: 'backend'
tags:
  - 'ai'
  - 'backend'
  - 'library'

project:
  title: 'AI Service Abstraction'
  description: 'Vendor-agnostic AI service layer with OpenAI, Gemini, and mock providers.'
  channel: '#backend'
  owner: 'Backend Team'

dependsOn:
  - 'constants'
  - 'schemas'
  - 'types'
  - 'logger'
  - 'utils'
  - 'mocks'

fileGroups:
  sources:
    - 'src/**/*'
  configs:
    - 'package.json'
    - 'tsconfig.json'
  tests:
    - 'tests/**/*'

tasks:
  typecheck:
    command: 'bun run typecheck'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  format:
    command: 'bun run format'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  lint:
    command: 'bun run lint'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  fix:
    command: 'bun run fix'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  test:
    command: 'bun run test'
    inputs:
      - '@group(sources)'
      - '@group(tests)'
      - '@group(configs)'
  validate:
    command: 'bun run validate'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
