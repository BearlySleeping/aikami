# packages/backend/ai/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'library'
stack: 'backend'
tags:
  - 'ai'
  - 'genkit'

project:
  name: 'AI'
  description: 'AI-related functionalities and integrations.'
  channel: '#backend'
  owner: 'Backend Team'

dependsOn:
  - 'constants'
  - 'schemas'
  - 'types'

fileGroups:
  sources:
    - 'src/**/*'
  configs:
    - 'deno.json'

tasks:
  check:
    command: 'deno task check'
    inputs:
      - '/deno.json'
      - '/deno.lock'
      - '@group(sources)'
      - '@group(configs)'
  format:
    command: 'deno task format'
    inputs:
      - '/deno.json'
      - '/deno.lock'
      - '@group(sources)'
      - '@group(configs)'
  lint:
    command: 'deno task lint'
    inputs:
      - '/deno.json'
      - '/deno.lock'
      - '@group(sources)'
      - '@group(configs)'
