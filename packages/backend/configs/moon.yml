# packages/backend/configs/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'library'
stack: 'backend'
tags:
  - 'config'
  - 'backend'
  - 'library'

project:
  title: 'Backend Configurations'
  description: 'Shared backend configuration files and environment schemas.'
  channel: '#backend'
  owner: 'Backend Team'

dependsOn:
  - 'constants'
  - 'schemas'
  - 'types'

fileGroups:
  sources:
    - 'src/**/*'
  configs:
    - 'package.json'
    - 'tsconfig.json'
  tests:
    - 'tests/**/*'

tasks:
  typecheck:
    command: 'bun run typecheck'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  format:
    command: 'bun run format'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  lint:
    command: 'bun run lint'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  check:
    command: 'bun run check'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  fix:
    command: 'bun run fix'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  validate:
    command: 'bun run validate'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
