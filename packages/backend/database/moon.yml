# packages/backend/database/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'library'
stack: 'backend'
tags:
  - 'database'
  - 'firebase'

project:
  name: 'Database'
  description: 'Database services and utilities.'
  channel: '#backend'
  owner: 'Backend Team'

dependsOn:
  - 'constants'
  - 'schemas'
  - 'types'
  - 'logger'

fileGroups:
  sources:
    - 'src/**/*'
  configs:
    - 'deno.json'

tasks:
  check:
    command: 'deno task check'
    inputs:
      - '/deno.json'
      - '/deno.lock'
      - '@group(sources)'
      - '@group(configs)'
  format:
    command: 'deno task format'
    inputs:
      - '/deno.json'
      - '/deno.lock'
      - '@group(sources)'
      - '@group(configs)'
  lint:
    command: 'deno task lint'
    inputs:
      - '/deno.json'
      - '/deno.lock'
      - '@group(sources)'
      - '@group(configs)'
