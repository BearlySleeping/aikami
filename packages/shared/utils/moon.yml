# packages/shared/utils/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'library'
tags:
  - 'utils'
  - 'shared'
  - 'library'

project:
  name: 'utils'
  description: 'Shared utility functions and helpers for the monorepo.'
  channel: '#general'
  owner: 'Core Team'

dependsOn:
  - 'constants'
  - 'types'
  - 'schemas'
  - 'logger'

fileGroups:
  sources:
    - 'src/**/*'
  configs:
    - 'package.json'
    - 'tsconfig.json'
  tests:
    - 'tests/**/*'

tasks:
  test:
    command: 'bun run test'
    inputs:
      - '@group(sources)'
      - '@group(tests)'
      - '@group(configs)'
