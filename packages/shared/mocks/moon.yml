# packages/shared/mocks/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'library'
tags:
  - 'mocks'
  - 'testing'
  - 'library'

project:
  name: 'mocks'
  description: 'Shared mocks and test fixtures for unit and integration tests.'
  channel: '#general'
  owner: 'Core Team'

dependsOn:
  - 'backend-database'
  - 'constants'
  - 'schemas'
  - 'types'

fileGroups:
  sources:
    - 'src/**/*'
  configs:
    - 'package.json'
    - 'tsconfig.json'
  tests:
    - 'tests/**/*'

tasks:
  test:
    command: 'bun run test'
    inputs:
      - '@group(sources)'
      - '@group(tests)'
      - '@group(configs)'
