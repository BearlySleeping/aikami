# packages/frontend/engine/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'library'
tags:
  - 'engine'
  - 'game'
  - 'library'

project:
  name: 'engine'
  description: 'Shared PixiJS v8 + bitECS game engine library.'
  channel: '#frontend'
  owner: 'Frontend Team'

dependsOn:
  - 'frontend-configs'
  - 'frontend-dataconnect'

fileGroups:
  sources:
    - 'src/**/*'
  configs:
    - 'package.json'
    - 'tsconfig.json'

tasks:
  test:
    command: 'bun test'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
