# packages/frontend/api-core/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'library'
tags:
  - 'api-core'
  - 'frontend'
  - 'library'

project:
  name: 'frontend-api-core'
  description: 'Game engine API client and frontend AI provider abstraction layer.'
  channel: '#frontend'
  owner: 'Frontend Team'

dependsOn:
  - 'constants'
  - 'schemas'
  - 'types'
  - 'logger'
  - 'utils'

fileGroups:
  sources:
    - 'src/**/*'
  configs:
    - 'package.json'
    - 'tsconfig.json'
  tests:
    - 'tests/**/*'

tasks:
  test:
    command: 'bun test'
    inputs:
      - '@group(sources)'
      - '@group(tests)'
      - '@group(configs)'
