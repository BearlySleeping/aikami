# packages/frontend/services/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'library'
stack: 'frontend'
tags:
  - 'services'
  - 'frontend'
  - 'library'

project:
  title: 'Frontend Services'
  description: 'Shared frontend services for API calls and data fetching.'
  channel: '#frontend'
  owner: 'Frontend Team'

dependsOn:
  - 'constants'
  - 'schemas'
  - 'types'
  - 'logger'
  - 'frontend-utils'

fileGroups:
  sources:
    - 'src/**/*'
  configs:
    - 'package.json'
    - 'tsconfig.json'
  tests:
    - 'tests/**/*'

tasks:
  typecheck:
    command: 'bun run typecheck'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  format:
    command: 'bun run format'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  lint:
    command: 'bun run lint'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  fix:
    command: 'bun run fix'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
