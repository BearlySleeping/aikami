# packages/frontend/components/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'library'
tags:
  - 'components'
  - 'shared'
  - 'library'
  - 'storybook'

project:
  name: 'frontend-components'
  description: 'Shared UI components library for Aikami.'
  channel: '#frontend'
  owner: 'Frontend Team'

fileGroups:
  sources:
    - 'src/**/*'
  configs:
    - 'package.json'
    - 'tsconfig.json'
    - 'svelte.config.js'
    - 'vite.config.ts'
    - '.storybook/**/*'
  tests:
    - 'tests/**/*'

tasks:
  dev:
    command: 'bun run dev'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    options:
      runInWorkspace: false

  build:
    command: 'bun run build'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    outputs:
      - 'storybook-static'
    options:
      runInWorkspace: false

  test:
    command: 'bun run test'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    options:
      runInWorkspace: false

