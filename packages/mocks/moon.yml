# packages/mocks/moon.yml
$schema: 'https://moonrepo.dev/schemas/project.json'

language: 'typescript'
layer: 'library'
tags:
  - 'mocks'
  - 'testing'
  - 'library'

project:
  title: 'Mocks'
  description: 'Shared mocks and test fixtures for unit and integration tests.'
  channel: '#general'
  owner: 'Core Team'

dependsOn:
  - 'constants'
  - 'schemas'
  - 'types'

fileGroups:
  sources:
    - 'src/**/*'
  configs:
    - 'package.json'
    - 'tsconfig.json'
  tests:
    - 'tests/**/*'

tasks:
  typecheck:
    command: 'bun run typecheck'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  format:
    command: 'bun run format'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  lint:
    command: 'bun run lint'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  test:
    command: 'bun run test'
    inputs:
      - '@group(sources)'
      - '@group(tests)'
      - '@group(configs)'
  fix:
    command: 'bun run fix'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
  validate:
    command: 'bun run validate'
    inputs:
      - '@group(sources)'
      - '@group(tests)'
      - '@group(configs)'
